<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세 얼간이 핑퐁 게임</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f0f0f0;
            font-family: 'Arial', sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            background: #e8e8e8;
            border: 10px solid #8d6e63; /* 나무 느낌의 벽 */
        }
        /* 워터마크 스타일 */
        #watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 80px;
            color: rgba(0, 0, 0, 0.05);
            pointer-events: none;
            white-space: nowrap;
            z-index: 100;
        }
        #info {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(255,255,255,0.7);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div id="watermark">세 얼간이 세 얼간이 세 얼간이</div>
<div id="info">마우스로 캐릭터를 드래그해보세요! (화면 클릭 시 소리 활성화)</div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // 사운드 생성을 위한 오디오 컨텍스트
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playHitSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440 + Math.random() * 440, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    }

    class Character {
        constructor(name, x, y, color) {
            this.name = name;
            this.x = x;
            this.y = y;
            this.radius = 40;
            this.dx = (Math.random() - 0.5) * 6;
            this.dy = (Math.random() - 0.5) * 6;
            this.color = color;
            this.isDragging = false;
        }

        draw() {
            // 몸체 (졸라맨 스타일의 귀여운 캐릭터)
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.closePath();

            // 이름표 (가슴 위치)
            ctx.fillStyle = "white";
            ctx.fillRect(this.x - 30, this.y - 10, 60, 20);
            ctx.strokeStyle = "black";
            ctx.strokeRect(this.x - 30, this.y - 10, 60, 20);

            ctx.fillStyle = "black";
            ctx.font = "bold 12px Arial";
            ctx.textAlign = "center";
            ctx.fillText(this.name, this.x, this.y + 4);

            // 눈 (방향감)
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.arc(this.x - 10, this.y - 20, 3, 0, Math.PI * 2);
            ctx.arc(this.x + 10, this.y - 20, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        update() {
            if (!this.isDragging) {
                // 벽 충돌 검사
                if (this.x + this.radius > canvas.width || this.x - this.radius < 0) {
                    this.dx = -this.dx;
                    playHitSound();
                }
                if (this.y + this.radius > canvas.height || this.y - this.radius < 0) {
                    this.dy = -this.dy;
                    playHitSound();
                }

                this.x += this.dx;
                this.y += this.dy;
            }
            this.draw();
        }
    }

    const characters = [
        new Character("Mr. Lee", 100, 100, "#ffadad"),
        new Character("Mr. KIM", 300, 200, "#9bf6ff"),
        new Character("Mr. SONG", 500, 400, "#caffbf")
    ];

    // 캐릭터 간 충돌 처리
    function handleCollisions() {
        for (let i = 0; i < characters.length; i++) {
            for (let j = i + 1; j < characters.length; j++) {
                const c1 = characters[i];
                const c2 = characters[j];
                const dist = Math.hypot(c1.x - c2.x, c1.y - c2.y);

                if (dist < c1.radius + c2.radius) {
                    // 충돌 시 튕겨나가기 (단순 속도 반전)
                    const tempDx = c1.dx;
                    const tempDy = c1.dy;
                    c1.dx = c2.dx;
                    c1.dy = c2.dy;
                    c2.dx = tempDx;
                    c2.dy = tempDy;
                    
                    // 겹침 방지
                    const overlap = c1.radius + c2.radius - dist;
                    const nx = (c1.x - c2.x) / dist;
                    const ny = (c1.y - c2.y) / dist;
                    c1.x += nx * overlap / 2;
                    c1.y += ny * overlap / 2;
                    c2.x -= nx * overlap / 2;
                    c2.y -= ny * overlap / 2;
                }
            }
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        handleCollisions();
        characters.forEach(c => c.update());
        requestAnimationFrame(animate);
    }

    // 마우스 이벤트 처리
    let activeChar = null;

    canvas.addEventListener('mousedown', (e) => {
        characters.forEach(c => {
            const dist = Math.hypot(e.clientX - c.x, e.clientY - c.y);
            if (dist < c.radius) {
                c.isDragging = true;
                activeChar = c;
            }
        });
    });

    window.addEventListener('mousemove', (e) => {
        if (activeChar) {
            activeChar.x = e.clientX;
            activeChar.y = e.clientY;
        }
    });

    window.addEventListener('mouseup', () => {
        if (activeChar) {
            activeChar.isDragging = false;
            // 던지는 효과를 위해 랜덤 속도 부여
            activeChar.dx = (Math.random() - 0.5) * 8;
            activeChar.dy = (Math.random() - 0.5) * 8;
            activeChar = null;
        }
    });

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    animate();
</script>
</body>
</html>
