<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>세 얼간이: 머리카락 대전 Pro</title>
    <style>
        body {
            margin: 0; overflow: hidden;
            background: radial-gradient(circle, #fdfbfb 0%, #ebedee 100%);
            font-family: 'Pretendard', sans-serif;
            touch-action: none;
        }
        #watermark {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 15vw; color: rgba(0, 0, 0, 0.03);
            pointer-events: none; white-space: nowrap; font-weight: 900;
        }
        #ui {
            position: fixed; top: 30px; width: 100%;
            text-align: center; pointer-events: none;
        }
        .status {
            background: rgba(255,255,255,0.9);
            padding: 12px 25px; border-radius: 50px;
            font-weight: bold; color: #333;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<div id="watermark">세 얼간이</div>
<div id="ui"><div class="status" id="statusMsg">빠르게 드래그해서 머리카락을 뺏으세요!</div></div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let audioCtx = null;
    function playSound(freq, type = 'sine') {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
    }

    class Character {
        constructor(name, x, y, mainColor, darkColor) {
            this.name = name;
            this.x = x; this.y = y;
            this.dx = (Math.random() - 0.5) * 4;
            this.dy = (Math.random() - 0.5) * 4;
            this.mainColor = mainColor;
            this.darkColor = darkColor;
            this.hairCount = 1;
            this.isDragging = false;
            this.shockTimer = 0;
            this.anim = 0;
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);

            // 1. 발밑 그림자 (고급스러움의 핵심)
            ctx.beginPath();
            ctx.ellipse(0, 50, 30, 10, 0, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(0,0,0,0.1)";
            ctx.fill();

            let walk = (Math.abs(this.dx) + Math.abs(this.dy) > 0.5 && !this.isDragging) ? Math.sin(this.anim += 0.2) : 0;

            // 2. 팔다리 (선이 아닌 면으로 처리)
            ctx.fillStyle = "#ffe0bd";
            // 왼다리/오른다리
            ctx.fillRect(-12, 20 + (walk * 5), 8, 25);
            ctx.fillRect(4, 20 - (walk * 5), 8, 25);

            // 3. 몸통 (그라데이션 추가)
            let bodyGrad = ctx.createLinearGradient(-20, -20, 20, 25);
            bodyGrad.addColorStop(0, this.mainColor);
            bodyGrad.addColorStop(1, this.darkColor);
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.roundRect(-22, -25, 44, 50, 10);
            ctx.fill();

            // 4. 이름표
            ctx.fillStyle = "rgba(255,255,255,0.9)";
            ctx.fillRect(-18, -5, 36, 14);
            ctx.fillStyle = "#333";
            ctx.font = "bold 9px Arial";
            ctx.textAlign = "center";
            ctx.fillText(this.name, 0, 6);

            // 5. 머리 (입체감 있는 구체)
            let headGrad = ctx.createRadialGradient(-5, -50, 2, 0, -45, 20);
            headGrad.addColorStop(0, "#fff5ea");
            headGrad.addColorStop(1, "#ffe0bd");
            ctx.fillStyle = headGrad;
            ctx.beginPath();
            ctx.arc(0, -45, 22, 0, Math.PI * 2);
            ctx.fill();

            // 6. 머리카락 (부드러운 곡선)
            ctx.strokeStyle = "#222";
            ctx.lineWidth = 3;
            ctx.lineCap = "round";
            for(let i=0; i<this.hairCount; i++) {
                let ox = (i - (this.hairCount-1)/2) * 10;
                ctx.beginPath();
                ctx.moveTo(ox, -65);
                ctx.bezierCurveTo(ox+10, -80, ox-10, -85, ox+5, -95);
                ctx.stroke();
            }

            // 7. 얼굴 (정교한 눈동자)
            this.drawFace();

            ctx.restore();
        }

        drawFace() {
            ctx.lineWidth = 2;
            ctx.lineCap = "round";
            if (this.shockTimer > 0) { // 찡그림
                ctx.strokeStyle = "#555";
                ctx.beginPath();
                ctx.moveTo(-12, -52); ctx.lineTo(-4, -48); ctx.moveTo(-12, -48); ctx.lineTo(-4, -52);
                ctx.moveTo(12, -52); ctx.lineTo(4, -48); ctx.moveTo(12, -48); ctx.lineTo(4, -52);
                ctx.stroke();
            } else if (this.hairCount >= 3) { // 승자의 웃음
                ctx.fillStyle = "#333";
                ctx.beginPath(); ctx.arc(-8, -50, 3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(8, -50, 3, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = "#ff4757";
                ctx.beginPath(); ctx.arc(0, -40, 8, 0.1 * Math.PI, 0.9 * Math.PI); ctx.stroke();
            } else if (this.hairCount === 0) { // 패자의 슬픔
                ctx.strokeStyle = "#3498db";
                ctx.beginPath(); ctx.moveTo(-10, -55); ctx.lineTo(-10, -45); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(10, -55); ctx.lineTo(10, -45); ctx.stroke();
                ctx.strokeStyle = "#555";
                ctx.beginPath(); ctx.moveTo(-6, -38); ctx.quadraticCurveTo(0, -43, 6, -38); ctx.stroke();
            } else { // 기본 눈웃음
                ctx.strokeStyle = "#333";
                ctx.beginPath(); ctx.moveTo(-12, -48); ctx.quadraticCurveTo(-8, -54, -4, -48); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(12, -48); ctx.quadraticCurveTo(8, -54, 4, -48); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-5, -40); ctx.quadraticCurveTo(0, -35, 5, -40); ctx.stroke();
            }
        }

        update() {
            if (this.shockTimer > 0) this.shockTimer--;
            if (!this.isDragging) {
                if (this.x < 30 || this.x > canvas.width - 30) { this.dx *= -1; this.shockTimer=15; playSound(300); }
                if (this.y < 80 || this.y > canvas.height - 60) { this.dy *= -1; this.shockTimer=15; playSound(300); }
                this.x += this.dx; this.y += this.dy;
                this.dx *= 0.99; this.dy *= 0.99;
            }
        }
    }

    const players = [
        new Character("Mr. Lee", 100, 200, "#4facfe", "#00f2fe"),
        new Character("Mr. KIM", 200, 400, "#ff9a9e", "#fecfef"),
        new Character("Mr. SONG", 300, 200, "#667eea", "#764ba2")
    ];

    function checkCollisions() {
        for (let i = 0; i < players.length; i++) {
            for (let j = i + 1; j < players.length; j++) {
                let p1 = players[i]; let p2 = players[j];
                let dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
                if (dist < 65) {
                    let s1 = Math.hypot(p1.dx, p1.dy);
                    let s2 = Math.hypot(p2.dx, p2.dy);
                    if (s1 > s2 + 1 && p2.hairCount > 0) {
                        p1.hairCount += p2.hairCount; p2.hairCount = 0; playSound(600, 'square');
                    } else if (s2 > s1 + 1 && p1.hairCount > 0) {
                        p2.hairCount += p1.hairCount; p1.hairCount = 0; playSound(600, 'square');
                    }
                    [p1.dx, p2.dx] = [p2.dx * 1.5, p1.dx * 1.5];
                    [p1.dy, p2.dy] = [p2.dy * 1.5, p1.dy * 1.5];
                    p1.shockTimer = 20; p2.shockTimer = 20;
                }
            }
        }
    }

    function drawLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        checkCollisions();
        players.forEach(p => { p.update(); p.draw(); });
        let winner = players.find(p => p.hairCount >= 3);
        if(winner) document.getElementById('statusMsg').innerHTML = `👑 <b>${winner.name}</b> 승리!`;
        requestAnimationFrame(drawLoop);
    }

    let target = null;
    let lastPos = {x:0, y:0};

    canvas.addEventListener('touchstart', e => {
        if(!audioCtx) playSound(100);
        const t = e.touches[0];
        players.forEach(p => {
            if(Math.hypot(t.clientX - p.x, t.clientY - p.y) < 50) { target = p; p.isDragging = true; }
        });
        lastPos = {x:t.clientX, y:t.clientY};
    });

    canvas.addEventListener('touchmove', e => {
        if(target) {
            const t = e.touches[0];
            target.dx = t.clientX - lastPos.x; target.dy = t.clientY - lastPos.y;
            target.x = t.clientX; target.y = t.clientY;
            lastPos = {x:t.clientX, y:t.clientY};
        }
        e.preventDefault();
    }, {passive:false});

    canvas.addEventListener('touchend', () => { if(target){ target.isDragging = false; target = null; } });

    drawLoop();
</script>
</body>
</html>
