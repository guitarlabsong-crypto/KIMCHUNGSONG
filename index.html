<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>블록 얼간이: 포도 대전</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f7f8fa; font-family: sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        canvas { display: block; z-index: 1; position: relative; }
        #watermark {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 15vw; color: rgba(0, 0, 0, 0.04); pointer-events: none; white-space: nowrap; font-weight: bold; z-index: 0;
        }
        #ui { position: fixed; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        .status { display: inline-block; background: rgba(0,0,0,0.7); color: #fff; padding: 10px 20px; border: 3px solid #fff; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div id="watermark">세얼간이</div>
<div id="ui"><div class="status" id="statusMsg">포도를 먹으면 머리카락이 회복됩니다!</div></div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let audioCtx = null;
    let lastSoundTime = 0;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    function playSound(freq, type = 'square') {
        const now = Date.now(); if (now - lastSoundTime < 80) return; lastSoundTime = now;
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    // --- 공통 블록 그리기 ---
    function drawCube(x, y, w, h, d, color, rotation = 0) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation);

        const adjust = (col, amt) => {
            let r = parseInt(col.substring(1, 3), 16);
            let g = parseInt(col.substring(3, 5), 16);
            let b = parseInt(col.substring(5, 7), 16);
            return `rgb(${Math.max(0,Math.min(255,r+amt))},${Math.max(0,Math.min(255,g+amt))},${Math.max(0,Math.min(255,b+amt))})`;
        };

        // 윗면
        ctx.fillStyle = adjust(color, 30);
        ctx.beginPath();
        ctx.moveTo(-w/2, -h/2); ctx.lineTo(-w/2+d, -h/2-d); ctx.lineTo(w/2+d, -h/2-d); ctx.lineTo(w/2, -h/2);
        ctx.fill();
        // 옆면
        ctx.fillStyle = adjust(color, -30);
        ctx.beginPath();
        ctx.moveTo(w/2, -h/2); ctx.lineTo(w/2+d, -h/2-d); ctx.lineTo(w/2+d, h/2-d); ctx.lineTo(w/2, h/2);
        ctx.fill();
        // 앞면
        ctx.fillStyle = color;
        ctx.fillRect(-w/2, -h/2, w, h);

        ctx.restore();
    }

    // --- 아이템 클래스 (크기 확대) ---
    class Item {
        constructor(type) { this.type = type; this.reset(); }
        reset() {
            this.x = Math.random() * (canvas.width - 60) + 30;
            this.y = Math.random() * (canvas.height - 100) + 50;
            this.active = true;
        }
        draw() {
            if(!this.active) return;
            if(this.type === 'banana') drawCube(this.x, this.y, 25, 10, 8, "#f1c40f"); // 바나나 크게
            else if(this.type === 'coconut') drawCube(this.x, this.y, 20, 20, 10, "#6d4c41"); // 코코넛 크게
            else drawCube(this.x, this.y, 20, 20, 10, "#8e44ad"); // 포도 (회복)
        }
    }

    class Projectile {
        constructor(x, y, target, owner) {
            this.x = x; this.y = y; this.target = target; this.owner = owner;
            this.speed = 5; this.active = true;
        }
        update() {
            let dx = this.target.x - this.x, dy = this.target.y - this.y;
            let dist = Math.hypot(dx, dy);
            if(dist < 20) {
                this.target.hitShock = 40; // 피격 효과 타이머
                this.target.dx *= 1.5; this.target.dy *= 1.5; // 반동
                playSound(300, 'triangle');
                this.active = false;
            }
            this.x += (dx/dist) * this.speed; this.y += (dy/dist) * this.speed;
        }
        draw() { drawCube(this.x, this.y, 10, 10, 5, "#4e342e"); }
    }

    class Character {
        constructor(name, x, y, type) {
            this.name = name; this.x = x; this.y = y; this.type = type;
            this.dx = (Math.random()-0.5)*1.5; this.dy = (Math.random()-0.5)*1.5;
            this.skin = "#ffe0bd"; this.hairCount = 1; this.isDragging = false;
            this.anim = 0; this.spinAngle = 0; this.isSpinning = false;
            this.hitShock = 0; // 코코넛 피격 타이머
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);

            // 빙글빙글 효과
            if (this.isSpinning) { this.spinAngle += 0.3; ctx.rotate(this.spinAngle); if(this.spinAngle > Math.PI*4){this.isSpinning=false; this.spinAngle=0;} }

            let swing = (Math.hypot(this.dx, this.dy) > 0.1 && !this.isDragging) ? Math.sin(this.anim += 0.15) * 10 : 0;

            // 1. 다리
            drawCube(-8, 25 + swing, 8, 18, 5, "#333333");
            drawCube(8, 25 - swing, 8, 18, 5, "#333333");

            // 2. 몸통 (가슴에 이름 복원)
            let bodyCol = this.type === 'lee' ? "#3498db" : (this.type === 'kim' ? "#e84118" : "#2ecc71");
            drawCube(0, 5, 30, 35, 8, bodyCol);

            // 가슴 이름표
            ctx.fillStyle = "#fff"; ctx.fillRect(-12, -2, 24, 10);
            ctx.fillStyle = "#000"; ctx.font = "bold 8px Courier New"; ctx.textAlign="center"; ctx.textBaseline="middle";
            ctx.fillText(this.name, 0, 4);

            // 3. 팔
            drawCube(-20, 5 - swing, 7, 25, 4, this.skin);
            drawCube(20, 5 + swing, 7, 25, 4, this.skin);

            // 4. 머리 및 얼굴 (코코넛 피격 시 파래짐)
            let faceCol = (this.hitShock > 0) ? "#3498db" : this.skin; // 피격 시 파란색
            drawCube(0, -30, 32, 32, 10, faceCol);
            this.drawPixelFace(); // 정밀 얼굴 그리기

            // 5. 머리카락
            for(let i=0; i<this.hairCount; i++) {
                drawCube((i-(this.hairCount-1)/2)*8, -52, 6, 6, 6, "#000000");
            }

            ctx.restore();
        }

        drawPixelFace() {
            ctx.fillStyle = (this.hitShock > 0) ? "#fff" : "#333"; // 파란 얼굴일 때 흰색 표정
            let browY = -38, eyeY = -32, mouthY = -22;
            if(this.hitShock > 0) { // 피격 표정 (> <)
                ctx.fillRect(-12, browY-2, 6, 2); ctx.fillRect(6, browY-2, 6, 2); // 눈썹
                ctx.fillRect(-11, eyeY, 4, 4); ctx.fillRect(7, eyeY, 4, 4); // 눈
                ctx.fillRect(-8, mouthY, 16, 3); // 꾹 다문 입
            } else { // 기본 눈웃음
                ctx.fillRect(-12, browY, 6, 2); ctx.fillRect(6, browY, 6, 2);
                ctx.fillRect(-11, eyeY, 4, 4); ctx.fillRect(7, eyeY, 4, 4);
                ctx.fillRect(-6, mouthY, 12, 2); // 입
            }
        }

        update() {
            if(this.hitShock > 0) this.hitShock--;
            if(!this.isDragging) {
                // 벽 충돌 (소리 오류 방지)
                if(this.x < 30 || this.x > canvas.width - 30) { this.dx *= -1; this.x = this.x < 30 ? 30 : canvas.width - 30; playSound(200); }
                if(this.y < 60 || this.y > canvas.height - 40) { this.dy *= -1; this.y = this.y < 60 ? 60 : canvas.height - 40; playSound(200); }
                this.x += this.dx; this.y += this.dy;
                // 천천히 돌아다니기 (최소 속도)
                if(Math.hypot(this.dx, this.dy) < 0.5) { this.dx += (Math.random()-0.5)*0.1; this.dy += (Math.random()-0.5)*0.1; }
                this.dx *= 0.992; this.dy *= 0.992;
            }
        }
    }

    const players = [new Character("Lee", 80, 150, 'lee'), new Character("Kim", canvas.width-80, 200, 'kim'), new Character("Song", canvas.width/2, canvas.height-120, 'song')];
    let items = [new Item('banana'), new Item('coconut'), new Item('grapes')];
    let projectiles = [];

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        projectiles = projectiles.filter(p => p.active);
        projectiles.forEach(p => { p.update(); p.draw(); });

        items.forEach(item => {
            item.draw();
            players.forEach(p => {
                if(item.active && Math.hypot(p.x - item.x, p.y - item.y) < 35) { // 줍는 거리 확대
                    item.active = false; playSound(600, 'sine');
                    if(item.type === 'banana') p.isSpinning = true;
                    else if(item.type === 'coconut') { // 가장 가까운 적에게 코코넛 발사
                        let target = players.filter(pl => pl !== p).sort((a,b) => Math.hypot(p.x-a.x, p.y-a.y) - Math.hypot(p.x-b.x, p.y-b.y))[0];
                        projectiles.push(new Projectile(p.x, p.y, target, p));
                    } else { // 포도 (머리카락 회복)
                        p.hairCount++; playSound(800, 'square');
                    }
                    setTimeout(() => item.reset(), 5000); // 5초 뒤 재생성
                }
            });
        });

        // 캐릭터 간 물리 충돌 복원
        for(let i=0; i<3; i++) {
            for(let j=i+1; j<3; j++) {
                let p1=players[i], p2=players[j];
                let dist = Math.hypot(p1.x-p2.x, p1.y-p2.y);
                if(dist < 50) { // 충돌 거리
                    playSound(400);
                    // 1. 머리카락 뺏기 룰 (빠른 사람이 뺏음)
                    let s1 = Math.hypot(p1.dx, p1.dy);
                    let s2 = Math.hypot(p2.dx, p2.dy);
                    if(s1 > s2 + 0.6 && p2.hairCount > 0) {
                        p1.hairCount += p2.hairCount; p2.hairCount = 0; playSound(900, 'square');
                    } else if(s2 > s1 + 0.6 && p1.hairCount > 0) {
                        p2.hairCount += p1.hairCount; p1.hairCount = 0; playSound(900, 'square');
                    }
                    // 2. 물리적 튕김 (탄성 충돌)
                    let ang = Math.atan2(p2.y-p1.y, p2.x-p1.x);
                    [p1.dx, p2.dx] = [p2.dx, p1.dx]; [p1.dy, p2.dy] = [p2.dy, p1.dy];
                    // 겹침 방지
                    p1.x -= Math.cos(ang) * 5; p1.y -= Math.sin(ang) * 5;
                    p2.x += Math.cos(ang) * 5; p2.y += Math.sin(ang) * 5;
                }
            }
        }

        players.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(gameLoop);
    }

    let target=null, lastP={x:0, y:0};
    canvas.addEventListener('touchstart', e => {
        if(!audioCtx) playSound(100);
        const t=e.touches[0];
        players.forEach(p => { if(Math.hypot(t.clientX-p.x, t.clientY-p.y)<40) {target=p; p.isDragging=true; p.dx=0; p.dy=0; } });
        lastP={x:t.clientX, y:t.clientY};
    });
    canvas.addEventListener('touchmove', e => {
        if(target) {
            const t=e.touches[0];
            target.dx=(t.clientX-lastPos.x)*0.4; target.dy=(t.clientY-lastPos.y)*0.4;
            target.x=t.clientX; target.y=t.clientY;
            lastPos={x:t.clientX, y:t.clientY};
        }
        e.preventDefault();
    }, {passive:false});
    canvas.addEventListener('touchend', () => { if(target) {target.isDragging=false; target=null;} });

    gameLoop();
</script>
</body>
</html>
