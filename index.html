<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>세얼간이: 링 위의 대전</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #dfe6e9; font-family: sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        canvas { display: block; position: relative; z-index: 1; }
        #watermark {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 15vw; color: rgba(0, 0, 0, 0.03); pointer-events: none; white-space: nowrap; font-weight: bold; z-index: 0;
        }
        #ui { position: fixed; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        .status { display: inline-block; background: rgba(0,0,0,0.8); color: #fff; padding: 10px 25px; border: 3px solid #fff; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

<div id="watermark">세얼간이</div>
<div id="ui"><div class="status">세얼간이</div></div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let audioCtx = null;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- 사운드 시스템 ---
    function playSound(freq, type = 'square', gainVal = 0.03) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(gainVal, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } catch (e) {}
    }

    // --- 공통 입체 블록 그리기 ---
    function drawCube(x, y, w, h, d, color, rotation = 0) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation);
        const adjust = (col, amt) => {
            let r = parseInt(col.substring(1, 3), 16), g = parseInt(col.substring(3, 5), 16), b = parseInt(col.substring(5, 7), 16);
            return `rgb(${Math.max(0,Math.min(255,r+amt))},${Math.max(0,Math.min(255,g+amt))},${Math.max(0,Math.min(255,b+amt))})`;
        };
        ctx.fillStyle = adjust(color, 30); ctx.beginPath(); ctx.moveTo(-w/2, -h/2); ctx.lineTo(-w/2+d, -h/2-d); ctx.lineTo(w/2+d, -h/2-d); ctx.lineTo(w/2, -h/2); ctx.fill();
        ctx.fillStyle = adjust(color, -30); ctx.beginPath(); ctx.moveTo(w/2, -h/2); ctx.lineTo(w/2+d, -h/2-d); ctx.lineTo(w/2+d, h/2-d); ctx.lineTo(w/2, h/2); ctx.fill();
        ctx.fillStyle = color; ctx.fillRect(-w/2, -h/2, w, h);
        ctx.restore();
    }

    // --- 복싱 링 그리기 (가변) ---
    function drawBoxingRing() {
        const offset = 30; const ropeX = offset; const ropeY = offset;
        const ringW = canvas.width - offset * 2; const ringH = canvas.height - offset * 2;
        
        // 1. 링 포스트 (모서리 기둥)
        const postS = 15; const postD = 8;
        drawCube(ropeX, ropeY, postS, postS*2, postD, "#ff4757"); // 빨강 (좌상)
        drawCube(canvas.width-ropeX, ropeY, postS, postS*2, postD, "#ff4757"); // 빨강 (우상)
        drawCube(ropeX, canvas.height-ropeY, postS, postS*2, postD, "#2e86de"); // 파랑 (좌하)
        drawCube(canvas.width-ropeX, canvas.height-ropeY, postS, postS*2, postD, "#2e86de"); // 파랑 (우하)

        // 2. 링 로프 (가변)
        ctx.lineWidth = 4; ctx.lineCap = "round";
        const drawRope = (y, col) => {
            ctx.strokeStyle = col; ctx.beginPath();
            ctx.moveTo(ropeX, y); ctx.lineTo(canvas.width - ropeX, y); // 상하 로프
            ctx.stroke();
        };
        const drawSideRope = (x, col) => {
            ctx.strokeStyle = col; ctx.beginPath();
            ctx.moveTo(x, ropeY); ctx.lineTo(x, canvas.height - ropeY); // 좌우 로프
            ctx.stroke();
        };

        // 빨간색 로프 (상단)
        drawRope(ropeY, "#ff4757"); drawRope(ropeY + 15, "#ff4757");
        drawSideRope(ropeX, "#ff4757"); drawSideRope(ropeX + 15, "#ff4757");
        // 파란색 로프 (하단)
        drawRope(canvas.height - ropeY, "#2e86de"); drawRope(canvas.height - ropeY - 15, "#2e86de");
        drawSideRope(canvas.width - ropeX, "#2e86de"); drawSideRope(canvas.width - ropeX - 15, "#2e86de");
    }

    // --- 아이템 클래스 (신규 폭탄 추가) ---
    class Item {
        constructor(type) { this.type = type; this.reset(); }
        reset() {
            this.x = Math.random() * (canvas.width - 100) + 50;
            this.y = Math.random() * (canvas.height - 150) + 70;
            this.active = true;
        }
        draw() {
            if(!this.active) return;
            if(this.type === 'banana') this.drawBanana();
            else if(this.type === 'coconut') this.drawCoconut();
            else if(this.type === 'grapes') this.drawGrapes();
            else this.drawBomb(); // 폭탄
        }
        drawBanana() {
            ctx.save(); ctx.translate(this.x, this.y); const col = "#f1c40f";
            drawCube(-10, 0, 15, 4, 3, col, -0.3); drawCube(0, 2, 15, 4, 3, col, 0); drawCube(10, 0, 15, 4, 3, col, 0.3); drawCube(5, -5, 12, 3, 2, col, 0.6);
            ctx.restore();
        }
        drawCoconut() {
            ctx.save(); ctx.translate(this.x, this.y); drawCube(0, 0, 28, 28, 14, "#6d4c41");
            ctx.fillStyle = "#fff"; ctx.fillRect(-8, -8, 3, 3); ctx.fillRect(5, -2, 3, 3); ctx.fillRect(-2, 7, 3, 3);
            ctx.restore();
        }
        drawGrapes() {
            ctx.save(); ctx.translate(this.x, this.y); const col = "#8e44ad"; const s = 6;
            drawCube(0,-8,s,s,s/2,col); drawCube(-6,-2,s,s,s/2,col); drawCube(6,-2,s,s,s/2,col); drawCube(-9,4,s,s,s/2,col); drawCube(0,4,s,s,s/2,col); drawCube(9,4,s,s,s/2,col); drawCube(-6,10,s,s,s/2,col); drawCube(6,10,s,s,s/2,col); drawCube(0,16,s,s,s/2,col);
            ctx.restore();
        }
        drawBomb() { // 검은색 구체 + 심지
            ctx.save(); ctx.translate(this.x, this.y);
            drawCube(0, 0, 22, 22, 11, "#2d3436"); // 폭탄 몸통
            drawCube(0, -14, 6, 6, 3, "#fab1a0"); // 심지 꽂는 곳
            // 심지 (선)
            ctx.strokeStyle = "#e17055"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, -17); ctx.lineTo(0, -25); ctx.stroke();
            ctx.restore();
        }
    }

    class Projectile {
        constructor(x, y, target, owner) {
            this.x = x; this.y = y; this.target = target; this.owner = owner;
            this.speed = 6; this.active = true;
        }
        update() {
            let dx = this.target.x - this.x, dy = this.target.y - this.y;
            let dist = Math.hypot(dx, dy);
            if(dist < 25) {
                this.target.hitShock = 50; this.target.dx += (dx/dist)*5; this.target.dy += (dy/dist)*5;
                if(this.target.hairCount > 0) { this.target.hairCount--; this.owner.hairCount++; }
                this.active = false; playSound(300);
            }
            this.x += (dx/dist) * this.speed; this.y += (dy/dist) * this.speed;
        }
        draw() { drawCube(this.x, this.y, 12, 12, 6, "#4e342e"); }
    }

    class Character {
        constructor(name, x, y, type) {
            this.name = name; this.x = x; this.y = y; this.type = type;
            this.dx = (Math.random()-0.5)*2; this.dy = (Math.random()-0.5)*2;
            this.skin = "#ffe0bd"; this.hairCount = 1; this.isDragging = false;
            this.anim = 0; this.spinAngle = 0; this.isSpinning = false; this.hitShock = 0;
        }
        draw() {
            ctx.save(); ctx.translate(this.x, this.y);
            if (this.isSpinning) { this.spinAngle += 0.4; ctx.rotate(this.spinAngle); if(this.spinAngle > Math.PI*4){this.isSpinning=false; this.spinAngle=0;} }
            let swing = (Math.hypot(this.dx, this.dy) > 0.1 && !this.isDragging) ? Math.sin(this.anim += 0.2) * 10 : 0;
            drawCube(-8, 25 + swing, 8, 18, 5, "#333333"); drawCube(8, 25 - swing, 8, 18, 5, "#333333"); // 다리
            drawCube(-20, 5 - swing, 7, 22, 4, this.skin); drawCube(20, 5 + swing, 7, 22, 4, this.skin); // 팔
            let bodyCol = this.type === 'lee' ? "#3498db" : (this.type === 'kim' ? "#e84118" : "#2ecc71");
            drawCube(0, 5, 30, 35, 8, bodyCol); // 몸통
            ctx.fillStyle = "#fff"; ctx.fillRect(-12, -2, 24, 10); ctx.fillStyle = "#000"; ctx.font = "bold 9px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(this.name, 0, 4); // 이름표
            let headCol = this.hitShock > 0 ? "#3498db" : this.skin; drawCube(0, -30, 32, 32, 10, headCol); // 머리
            ctx.fillStyle = this.hitShock > 0 ? "#fff" : "#333"; ctx.fillRect(-11, -34, 4, 4); ctx.fillRect(7, -34, 4, 4); ctx.fillRect(-6, -23, 12, 2); // 얼굴
            
            // --- 입체 머리카락 그리기 (핵심!) ---
            this.drawAdvancedHair();
            
            ctx.restore();
        }

        drawAdvancedHair() {
            const col = "#000000"; const s = 7; const d = 7;
            const topY = -52; const sideY = -30; // 윗면과 옆면 고도

            // 머리카락 개수에 따른 정교한 배치
            for(let i=0; i<this.hairCount; i++) {
                if(i < 3) { // 1~3개: 머리 윗부분 채움
                    drawCube((i-1)*9, topY, s, s, d, col);
                } else if(i < 5) { // 4~5개: 왼쪽 옆면(귀) 타고 내려옴
                    drawCube(-20, sideY + (i-3)*9, s, s, d, col);
                } else if(i < 7) { // 6~7개: 오른쪽 옆면 타고 내려옴
                    drawCube(20, sideY + (i-5)*9, s, s, d, col);
                } else { // 8개 이상: 무작위로 귀 주변에 떡짐
                    drawCube((Math.random()-0.5)*40, sideY + (Math.random()*20), s, s, d, col);
                }
            }
        }

        update() {
            if(this.hitShock > 0) this.hitShock--;
            if(!this.isDragging) {
                // 링 충돌 (빨강/파랑 로프 범위)
                const margin = 40;
                if(this.x < margin || this.x > canvas.width - margin) { this.dx *= -0.8; this.x = this.x < margin ? margin : canvas.width - margin; }
                if(this.y < margin + 30 || this.y > canvas.height - margin) { this.dy *= -0.8; this.y = this.y < margin + 30 ? margin + 30 : canvas.height - margin; }
                this.x += this.dx; this.y += this.dy;
                if(Math.hypot(this.dx, this.dy) < 0.6) { this.dx += (Math.random()-0.5)*0.2; this.dy += (Math.random()-0.5)*0.2; }
                this.dx *= 0.992; this.dy *= 0.992;
            }
        }
    }

    const players = [new Character("Lee", 100, 200, 'lee'), new Character("Kim", canvas.width-100, 200, 'kim'), new Character("Song", canvas.width/2, canvas.height-150, 'song')];
    let items = [new Item('banana'), new Item('coconut'), new Item('grapes'), new Item('bomb')];
    let projectiles = [];

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        drawBoxingRing(); // 링 배경 그리기

        projectiles = projectiles.filter(p => p.active);
        projectiles.forEach(p => { p.update(); p.draw(); });
        
        items.forEach(item => {
            item.draw();
            players.forEach(p => {
                if(item.active && Math.hypot(p.x - item.x, p.y - item.y) < 35) {
                    item.active = false; playSound(500, 'sine');
                    if(item.type === 'banana') p.isSpinning = true;
                    else if(item.type === 'coconut') {
                        let target = players.filter(pl => pl !== p).sort((a,b) => Math.hypot(p.x-a.x, p.y-a.y) - Math.hypot(p.x-b.x, p.y-b.y))[0];
                        projectiles.push(new Projectile(p.x, p.y, target, p));
                    } else if(item.type === 'grapes') { p.hairCount++; playSound(800, 'square'); }
                    else { // 폭탄 (모두 초기화)
                        playSound(100, 'triangle', 0.1); // 쾅!
                        players.forEach(pl => pl.hairCount = 1);
                    }
                    setTimeout(() => item.reset(), 5000);
                }
            });
        });

        for(let i=0; i<3; i++) {
            for(let j=i+1; j<3; j++) {
                let p1=players[i], p2=players[j];
                let dist = Math.hypot(p1.x-p2.x, p1.y-p2.y);
                if(dist < 50) {
                    let s1 = Math.hypot(p1.dx, p1.dy), s2 = Math.hypot(p2.dx, p2.dy);
                    if(s1 > s2 + 0.6 && p2.hairCount > 0) { p1.hairCount++; p2.hairCount--; playSound(800, 'square'); }
                    else if(s2 > s1 + 0.6 && p1.hairCount > 0) { p2.hairCount++; p1.hairCount--; playSound(800, 'square'); }
                    [p1.dx, p2.dx] = [p2.dx, p1.dx]; [p1.dy, p2.dy] = [p2.dy, p1.dy];
                    let ang = Math.atan2(p2.y-p1.y, p2.x-p1.x); p1.x -= Math.cos(ang) * 5; p1.y -= Math.sin(ang) * 5; p2.x += Math.cos(ang) * 5; p2.y += Math.sin(ang) * 5;
                }
            }
        }
        players.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(loop);
    }

    // 터치 이벤트 유지
    let dragTarget = null; let lastT = { x: 0, y: 0 };
    canvas.addEventListener('touchstart', (e) => {
        const t = e.touches[0];
        players.forEach(p => { if (Math.hypot(t.clientX - p.x, t.clientY - p.y) < 50) { dragTarget = p; p.isDragging = true; p.dx = 0; p.dy = 0; } });
        lastT = { x: t.clientX, y: t.clientY };
    }, { passive: false });
    canvas.addEventListener('touchmove', (e) => {
        if (dragTarget) {
            const t = e.touches[0];
            dragTarget.dx = (t.clientX - lastT.x) * 0.5; dragTarget.dy = (t.clientY - lastT.y) * 0.5;
            dragTarget.x = t.clientX; dragTarget.y = t.clientY;
            lastPos = { x: t.clientX, y: t.clientY };
        }
        e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('touchend', () => { if (dragTarget) { dragTarget.isDragging = false; dragTarget = null; } });

    loop();
</script>
</body>
</html>
