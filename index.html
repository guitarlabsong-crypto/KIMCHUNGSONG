<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>세 얼간이 모바일 게임</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #e0e0e0;
            font-family: sans-serif;
            touch-action: none; /* 브라우저 기본 터치 액션 방지 */
        }
        canvas {
            display: block;
        }
        #watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 10vw;
            color: rgba(0, 0, 0, 0.07);
            pointer-events: none;
            z-index: 0;
            white-space: nowrap;
        }
        #msg {
            position: fixed;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #555;
            font-weight: bold;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="watermark">세 얼간이 세 얼간이</div>
<div id="msg">화면을 터치하면 소리가 활성화됩니다!</div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // 화면 크기 설정
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 오디오 시스템 개선
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('msg').style.display = 'none';
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playBounceSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'triangle'; // 조금 더 부드러운 소리
        osc.frequency.setValueAtTime(300 + Math.random() * 200, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    class Character {
        constructor(name, x, y, color) {
            this.name = name;
            this.x = x;
            this.y = y;
            this.width = 60;  // 판정 너비
            this.height = 100; // 판정 높이
            this.dx = (Math.random() - 0.5) * 4;
            this.dy = (Math.random() - 0.5) * 4;
            this.color = color;
            this.isDragging = false;
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);

            // 1. 머리
            ctx.fillStyle = "#ffe0bd"; // 살구색
            ctx.beginPath();
            ctx.arc(0, -35, 15, 0, Math.PI * 2);
            ctx.fill();

            // 2. 몸통 (옷)
            ctx.fillStyle = this.color;
            ctx.fillRect(-15, -20, 30, 40);

            // 3. 이름표 (가슴 위치)
            ctx.fillStyle = "white";
            ctx.fillRect(-18, -10, 36, 12);
            ctx.fillStyle = "black";
            ctx.font = "bold 8px Arial";
            ctx.textAlign = "center";
            ctx.fillText(this.name, 0, -1);

            // 4. 팔다리 (간단한 선)
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 4;
            ctx.lineCap = "round";
            
            // 팔
            ctx.beginPath();
            ctx.moveTo(-15, -15); ctx.lineTo(-25, 5); // 왼팔
            ctx.moveTo(15, -15); ctx.lineTo(25, 5);  // 오른팔
            // 다리
            ctx.moveTo(-8, 20); ctx.lineTo(-12, 45); // 왼다리
            ctx.moveTo(8, 20); ctx.lineTo(12, 45);   // 오른다리
            ctx.stroke();

            ctx.restore();
        }

        update() {
            if (!this.isDragging) {
                // 벽 충돌 (좌우)
                if (this.x - 30 < 0 || this.x + 30 > canvas.width) {
                    this.dx *= -1;
                    this.x = this.x < 30 ? 30 : canvas.width - 30;
                    playBounceSound();
                }
                // 벽 충돌 (상하)
                if (this.y - 50 < 0 || this.y + 50 > canvas.height) {
                    this.dy *= -1;
                    this.y = this.y < 50 ? 50 : canvas.height - 50;
                    playBounceSound();
                }

                this.x += this.dx;
                this.y += this.dy;
            }
        }
    }

    const players = [
        new Character("Mr. Lee", 100, 100, "#3498db"),
        new Character("Mr. KIM", 200, 200, "#e74c3c"),
        new Character("Mr. SONG", 150, 300, "#2ecc71")
    ];

    function checkCollision() {
        for (let i = 0; i < players.length; i++) {
            for (let j = i + 1; j < players.length; j++) {
                let p1 = players[i];
                let p2 = players[j];
                let dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
                
                if (dist < 60) { // 캐릭터 간 거리 기반 충돌
                    // 속도 교환
                    [p1.dx, p2.dx] = [p2.dx, p1.dx];
                    [p1.dy, p2.dy] = [p2.dy, p1.dy];
                    
                    // 겹침 방지
                    let angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                    p1.x -= Math.cos(angle) * 2;
                    p1.y -= Math.sin(angle) * 2;
                    p2.x += Math.cos(angle) * 2;
                    p2.y += Math.sin(angle) * 2;
                }
            }
        }
    }

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        checkCollision();
        players.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(loop);
    }

    // 모바일 터치 이벤트
    let target = null;

    canvas.addEventListener('touchstart', (e) => {
        initAudio(); // 첫 터치 시 오디오 활성화
        const touch = e.touches[0];
        players.forEach(p => {
            if (Math.hypot(touch.clientX - p.x, touch.clientY - p.y) < 50) {
                target = p;
                p.isDragging = true;
            }
        });
    }, false);

    canvas.addEventListener('touchmove', (e) => {
        if (target) {
            const touch = e.touches[0];
            target.x = touch.clientX;
            target.y = touch.clientY;
        }
        e.preventDefault(); // 스크롤 방지
    }, { passive: false });

    canvas.addEventListener('touchend', () => {
        if (target) {
            target.isDragging = false;
            target.dx = (Math.random() - 0.5) * 10; // 던지는 효과
            target.dy = (Math.random() - 0.5) * 10;
            target = null;
        }
    }, false);

    loop();
</script>
</body>
</html>
